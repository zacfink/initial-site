    <style>
      :root {
        --paper: #ffffff;
        --paper-2: #f5f6f7;
        --paper-blur: rgba(255, 255, 255, 0.82);
        --ink: #0a0a0a;
        --ink-muted: #5a5f66;
        --hairline: #e3e5e8;
        --signal: #3a35ff;
        --signal-dim: rgba(58, 53, 255, 0.16);

        --display: "Space Grotesk", system-ui, sans-serif;
        --body: "IBM Plex Sans", system-ui, sans-serif;
        --mono: "IBM Plex Mono", ui-monospace, monospace;

        --pad: clamp(1.25rem, 5vw, 4rem);
        --maxw: 1080px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --paper: #0b0c0e;
          --paper-2: #14161a;
          --paper-blur: rgba(11, 12, 14, 0.82);
          --ink: #f2f3f5;
          --ink-muted: #9aa0a8;
          --hairline: #242830;
          --signal: #6f6bff;
          --signal-dim: rgba(111, 107, 255, 0.22);
        }
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--body);
        font-size: 1.0625rem;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        transition:
          background 0.3s ease,
          color 0.3s ease;
      }

      a {
        color: inherit;
      }
      ::selection {
        background: var(--signal);
        color: #fff;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding-left: var(--pad);
        padding-right: var(--pad);
      }

      .mono {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }

      /* ---------- top bar ---------- */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: var(--paper-blur);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--hairline);
      }
      .topbar .wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 60px;
      }
      .brand {
        font-family: var(--display);
        font-weight: 600;
        letter-spacing: -0.02em;
        font-size: 1.15rem;
        text-decoration: none;
      }
      .brand .dot {
        color: var(--signal);
      }
      .nav {
        display: flex;
        gap: 1.75rem;
      }
      .nav a {
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--ink-muted);
        transition: color 0.2s ease;
      }
      .nav a:hover {
        color: var(--ink);
      }
      @media (max-width: 640px) {
        .nav {
          display: none;
        }
      }

      /* ---------- hero (the HUD moment) ---------- */
      .hero {
        position: relative;
        padding-top: clamp(4rem, 12vh, 9rem);
        padding-bottom: clamp(4rem, 12vh, 8rem);
      }
      .hud-frame {
        position: absolute;
        inset: clamp(1.5rem, 6vw, 4rem) calc(var(--pad) - 0.5rem);
        pointer-events: none;
      }
      @keyframes hud-in {
        to {
          opacity: 1;
        }
      }
      .hud-frame span {
        position: absolute;
        width: 18px;
        height: 18px;
        border: 1.5px solid var(--signal-dim);
        opacity: 0;
        animation: hud-in 1s ease 0.4s forwards;
      }
      .hud-frame .tl {
        top: 0;
        left: 0;
        border-right: 0;
        border-bottom: 0;
      }
      .hud-frame .tr {
        top: 0;
        right: 0;
        border-left: 0;
        border-bottom: 0;
      }
      .hud-frame .bl {
        bottom: 0;
        left: 0;
        border-right: 0;
        border-top: 0;
      }
      .hud-frame .br {
        bottom: 0;
        right: 0;
        border-left: 0;
        border-top: 0;
      }

      .hero h1 {
        font-family: var(--display);
        font-weight: 500;
        font-size: clamp(2.6rem, 8vw, 5.6rem);
        line-height: 1.02;
        letter-spacing: -0.035em;
        margin: 0 0 1.5rem;
        max-width: 16ch;
      }
      .hero h1 em {
        font-style: normal;
        color: var(--signal);
      }
      .hero .lede {
        font-size: clamp(1.05rem, 2.2vw, 1.3rem);
        color: var(--ink-muted);
        max-width: 46ch;
        margin: 0 0 2.4rem;
      }
      .hero-cta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
        align-items: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--mono);
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-decoration: none;
        padding: 0.85rem 1.3rem;
        border: 1.5px solid var(--ink);
        transition:
          background 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease;
      }
      .btn.primary {
        background: var(--ink);
        color: var(--paper);
      }
      .btn.primary:hover {
        background: var(--signal);
        border-color: var(--signal);
        color: #fff;
      }
      .btn.ghost:hover {
        border-color: var(--signal);
        color: var(--signal);
      }
      .btn:active {
        transform: translateY(1px);
      }

      /* ---------- generic section ---------- */
      .section {
        padding-top: clamp(3.5rem, 9vh, 6.5rem);
        padding-bottom: clamp(3.5rem, 9vh, 6.5rem);
        border-top: 1px solid var(--hairline);
      }
      .section-head {
        margin-bottom: 2.8rem;
      }
      .section-head .eyebrow {
        display: block;
        margin-bottom: 0.9rem;
      }
      .section-head h2 {
        font-family: var(--display);
        font-weight: 500;
        font-size: clamp(1.6rem, 3.4vw, 2.4rem);
        letter-spacing: -0.025em;
        margin: 0;
        max-width: 24ch;
      }
      .subhead {
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin: 0 0 1.4rem;
      }

      /* ---------- about ---------- */
      .about-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: clamp(2rem, 5vw, 4rem);
      }
      .about-grid p {
        margin: 0 0 1.1rem;
        max-width: 54ch;
      }
      .about-grid p:last-child {
        margin-bottom: 0;
      }
      .facts {
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
      }
      .fact {
        border-top: 1px solid var(--hairline);
        padding-top: 0.9rem;
      }
      .fact dt {
        font-family: var(--mono);
        font-size: 0.68rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 0.35rem;
      }
      .fact dd {
        margin: 0;
        font-weight: 500;
      }
      @media (max-width: 760px) {
        .about-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ---------- work: featured ---------- */
      .featured {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--hairline);
        border: 1px solid var(--hairline);
      }
      .proj {
        background: var(--paper);
        padding: 1.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        transition: background 0.25s ease;
      }
      .proj:hover {
        background: var(--paper-2);
      }
      .proj .tags {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .proj .tag {
        font-family: var(--mono);
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--signal);
      }
      .proj h3 {
        font-family: var(--display);
        font-weight: 500;
        font-size: 1.3rem;
        letter-spacing: -0.02em;
        margin: 0.2rem 0 0;
      }
      .proj p {
        margin: 0;
        color: var(--ink-muted);
        font-size: 0.98rem;
      }
      .proj .foot {
        margin-top: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding-top: 1rem;
      }
      .proj .meta {
        font-family: var(--mono);
        font-size: 0.66rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }
      @media (max-width: 760px) {
        .featured {
          grid-template-columns: 1fr;
        }
      }

      .repo {
        font-family: var(--mono);
        font-size: 0.66rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--ink);
        border-bottom: 1px solid var(--hairline);
        padding-bottom: 2px;
        transition:
          color 0.2s ease,
          border-color 0.2s ease;
        white-space: nowrap;
      }
      .repo:hover {
        color: var(--signal);
        border-color: var(--signal);
      }
      .repo-private {
        color: var(--ink-muted);
        border-color: transparent;
        cursor: default;
      }
      .repo-private:hover {
        color: var(--ink-muted);
        border-color: transparent;
      }

      /* ---------- now ---------- */
      .now-list {
        display: flex;
        flex-direction: column;
      }
      .now-row {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 1.5rem;
        padding: 1.5rem 0;
        border-top: 1px solid var(--hairline);
      }
      .now-row:last-child {
        border-bottom: 1px solid var(--hairline);
      }
      .now-row .role {
        font-family: var(--display);
        font-weight: 500;
        font-size: 1.15rem;
        letter-spacing: -0.01em;
      }
      .now-row .org {
        font-family: var(--mono);
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--signal);
        margin-top: 0.4rem;
      }
      .now-row p {
        margin: 0;
        color: var(--ink-muted);
      }
      @media (max-width: 680px) {
        .now-row {
          grid-template-columns: 1fr;
          gap: 0.5rem;
        }
      }

      /* ---------- stack ---------- */
      .chips {
        display: flex;
        flex-direction: column;
        gap: 1.8rem;
      }
      .chip-group {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 1.5rem;
        align-items: start;
      }
      .chip-label {
        font-family: var(--mono);
        font-size: 0.66rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--signal);
        padding-top: 0.55rem;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      .chip {
        font-family: var(--mono);
        font-size: 0.74rem;
        letter-spacing: 0.06em;
        border: 1px solid var(--hairline);
        padding: 0.5rem 0.85rem;
        color: var(--ink-muted);
        transition:
          border-color 0.2s ease,
          color 0.2s ease;
      }
      .chip:hover {
        border-color: var(--signal);
        color: var(--ink);
      }
      @media (max-width: 560px) {
        .chip-group {
          grid-template-columns: 1fr;
          gap: 0.7rem;
        }
        .chip-label {
          padding-top: 0;
        }
      }

      /* ---------- thoughts ---------- */
      .thoughts {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--hairline);
        border: 1px solid var(--hairline);
      }
      .thought {
        background: var(--paper);
        padding: 1.8rem;
      }
      .thought .n {
        font-family: var(--mono);
        font-size: 0.66rem;
        letter-spacing: 0.18em;
        color: var(--signal);
        display: block;
        margin-bottom: 1rem;
      }
      .thought p {
        margin: 0;
        font-family: var(--display);
        font-weight: 400;
        font-size: 1.18rem;
        line-height: 1.4;
        letter-spacing: -0.01em;
      }
      @media (max-width: 760px) {
        .thoughts {
          grid-template-columns: 1fr;
        }
      }

      /* ---------- contact ---------- */
      .contact h2 {
        font-family: var(--display);
        font-weight: 500;
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: -0.03em;
        margin: 0 0 1.8rem;
        max-width: 18ch;
        line-height: 1.05;
      }
      .contact-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.9rem;
      }

      /* ---------- footer ---------- */
      footer {
        border-top: 1px solid var(--hairline);
        padding: 2rem 0;
      }
      footer .wrap {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      footer .mono {
        font-size: 0.66rem;
      }

      /* ---------- scroll reveal ---------- */
      .reveal {
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 0.7s ease,
          transform 0.7s ease;
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal {
          opacity: 1;
          transform: none;
          transition: none;
        }
        .hud-frame span {
          animation: none;
          opacity: 1;
        }
        html {
          scroll-behavior: auto;
        }
      }

      :focus-visible {
        outline: 2px solid var(--signal);
        outline-offset: 3px;
      }
    </style>
  </head>

      <section class="section" id="stack">

          <div class="section-head reveal">
            <span class="eyebrow mono" id="stack-eyebrow"></span>
            <h2 id="stack-heading"></h2>
          </div>
          <div class="chips reveal" id="chips"></div>

      </section>

      <section class="section" id="thoughts">
        <div class="wrap">
          <div class="section-head reveal">
            <span class="eyebrow mono" id="thoughts-eyebrow"></span>

      <section class="section contact" id="contact">

          <h2 class="reveal" id="contact-heading"></h2>
          <div class="contact-links reveal" id="contact-links"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="wrap">
        <span class="mono" id="footer-left"></span>
        <span class="mono" id="footer-right"></span>
      </div>
    </footer>

            ],
          },

          contact: {
            eyebrow: "06 — Contact",
            heading: "Let's build something.",
            links: [
              {
                label: "Email me",
                href: "mailto:zacfinkelstein@gmail.com",
                style: "primary",
              },
              {
                label: "GitHub",
                href: "https://github.com/zacfink",
                style: "ghost",
              },
              {
                label: "LinkedIn",
                href: "https://www.linkedin.com/in/zacfinkelstein",
                style: "ghost",
              },
              {
                label: "Résumé",
                href: "assets/resume.pdf",
                style: "ghost",
                download: true,
              },
            ],
          },

          footer: {
            left: "© 2026 Zac",
            right: "Open to work",
          },
        };

        const $ = (sel) => document.querySelector(sel);

        const btn = (l) =>
          `<a class="btn ${l.style || "ghost"}" href="${l.href}"${l.download ? " download" : ""}>${l.label}</a>`;
        const repo = (url) =>
          url
            ? `<a class="repo" href="${url}" target="_blank" rel="noopener">Repo ↗</a>`
            : `<span class="repo repo-private">Private</span>`;

        function render() {
          $("#brand").innerHTML = `${SITE.brand}<span class="dot">.</span>`;
          $("#nav").innerHTML = SITE.nav
            .map((n) => `<a href="${n.href}">${n.label}</a>`)
            .join("");

          // hero
          $("#hero-headline").innerHTML =
            `${SITE.hero.headlineLead}<em>${SITE.hero.headlineAccent}</em>`;
          $("#hero-lede").textContent = SITE.hero.lede;
          $("#hero-cta").innerHTML = SITE.hero.ctas.map(btn).join("");

          // about
          $("#about-eyebrow").textContent = SITE.about.eyebrow;
          $("#about-heading").textContent = SITE.about.heading;
          $("#about-body").innerHTML = SITE.about.paragraphs
            .map((p) => `<p>${p}</p>`)
            .join("");
          $("#about-facts").innerHTML = SITE.about.facts
            .map(
              (f) =>
                `<div class="fact"><dt>${f.label}</dt><dd>${f.value}</dd></div>`,
            )
            .join("");

          // work
          $("#work-eyebrow").textContent = SITE.work.eyebrow;
          $("#work-heading").textContent = SITE.work.heading;
          $("#featured").innerHTML = SITE.work.featured
            .map(
              (p) => `
      <article class="proj">
        <div class="tags">${p.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
        <div class="foot"><span class="meta">${p.meta}</span>${repo(p.repo)}</div>
      </article>`,
            )
            .join("");

          // now
          $("#now-eyebrow").textContent = SITE.now.eyebrow;
          $("#now-heading").textContent = SITE.now.heading;
          $("#now-list").innerHTML = SITE.now.roles
            .map(
              (r) => `
      <div class="now-row">
        <div><div class="role">${r.role}</div><div class="org">${r.org}</div></div>
        <p>${r.desc}</p>
      </div>`,
            )
            .join("");

          // stack
          $("#stack-eyebrow").textContent = SITE.stack.eyebrow;
          $("#stack-heading").textContent = SITE.stack.heading;
          $("#chips").innerHTML = SITE.stack.groups
            .map(
              (g) => `
      <div class="chip-group">
        <span class="chip-label">${g.label}</span>
        <div class="chip-row">${g.items.map((s) => `<span class="chip">${s}</span>`).join("")}</div>
      </div>`,
            )
            .join("");

          // thoughts
          $("#thoughts-eyebrow").textContent = SITE.thoughts.eyebrow;
          $("#thoughts-heading").textContent = SITE.thoughts.heading;
          $("#thoughts-grid").innerHTML = SITE.thoughts.items
            .map(
              (t) =>
                `<div class="thought"><span class="n">${t.n}</span><p>${t.text}</p></div>`,
            )
            .join("");

          // contact
          $("#contact-eyebrow").textContent = SITE.contact.eyebrow;
          $("#contact-heading").textContent = SITE.contact.heading;
          $("#contact-links").innerHTML = SITE.contact.links.map(btn).join("");

          // footer
          $("#footer-left").textContent = SITE.footer.left;
          $("#footer-right").textContent = SITE.footer.right;
        }

        render();

        // scroll reveal — runs after content is in the DOM
        const reduce = window.matchMedia(
          "(prefers-reduced-motion: reduce)",
        ).matches;
        if (!reduce && "IntersectionObserver" in window) {
          const io = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  e.target.classList.add("in");
                  io.unobserve(e.target);
                }
              });
            },
            { threshold: 0.12 },
          );
          document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
        } else {
          document
            .querySelectorAll(".reveal")
            .forEach((el) => el.classList.add("in"));
        }
      })();
    </script>
  </body>
</html>
